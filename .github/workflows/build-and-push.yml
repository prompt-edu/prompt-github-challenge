name: Build and Push

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Optional image tag override"
        required: false
        type: string
    outputs:
      client_image_tag:
        description: "Tag of the built client image"
        value: ${{ jobs.client.outputs.image_tag }}

permissions:
  contents: read
  packages: write

jobs:
  client:
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@v1.2.0
    with:
      image-name: ghcr.io/prompt-edu/prompt-github-challenge/prompt-clients-github-challenge-component
      docker-file: client/Dockerfile
      docker-context: ./client
      tags: ${{ inputs.release_tag }}
      build-args: |
        "IMAGE_TAG=latest"
    secrets: inherit
